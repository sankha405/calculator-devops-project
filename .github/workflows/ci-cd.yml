name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint .

      - name: Debug Jest
        run: |
          node -v
          npm -v
          ls -la
          ls -la node_modules
          ls -la node_modules/.bin
          ls -la node_modules/jest/bin

      - name: Run Unit Tests
        run: npm test

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/calculator-app:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/calculator-app:latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/services.yml

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/calculator-deployment
          kubectl get deployments
          kubectl get pods
          kubectl get svc